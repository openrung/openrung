# OpenRung relay runtime.
#
#   cp .env.example .env      # then edit .env (set OPENRUNG_BROKER_URL + OPENRUNG_PUBLIC_HOST)
#   docker compose up -d --build
#   docker compose logs -f
#
services:
  relay:
    build:
      context: ../..
      dockerfile: deploy/relay/Dockerfile
      args:
        XRAY_VERSION: v26.3.27
    image: openrung-relay:latest
    container_name: openrung-relay
    restart: unless-stopped
    env_file: [.env]

    # An exit relay needs a real, reachable public address. Host networking:
    #   - exposes the server's real IPv6/IPv4 (no Docker NAT in the way)
    #   - lets the connection log record real client IPs
    # IPv4-only host and prefer bridge networking instead? Comment out
    # network_mode below, set OPENRUNG_LISTEN_HOST=0.0.0.0 in .env, and add:
    #   ports: ["443:443"]
    # (client IPs in the log will then show Docker's gateway, not the real client)
    network_mode: host

    # Least privilege: drop every capability, re-add only the ability to bind
    # the privileged public port (443). This relies on the file capability set
    # on the binary, so do NOT add `no-new-privileges` here (it would disable
    # the file capability and break the bind).
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]

    # The container filesystem is read-only; the only writable path needed is
    # the generated xray config under /tmp.
    read_only: true
    tmpfs:
      - /tmp

  # Optional, relay-local CDN fallback. Enable only on an eligible Foundation
  # relay with: docker compose --profile wss up -d --build
  #
  # This is deliberately the same per-relay image and host network as `relay`,
  # not a gateway fleet. The process binds only 127.0.0.1:8081 and its fixed
  # upstream defaults to 127.0.0.1:443, so it can reach only this host's Reality
  # listener. Terminate the CloudFront origin TLS listener on host port 8443 and
  # proxy that one route to this loopback listener; do not publish 8081.
  wss-sidecar:
    profiles: [wss]
    image: openrung-relay:latest
    container_name: openrung-wss-sidecar
    restart: unless-stopped
    entrypoint: [/usr/local/bin/wss-sidecar]
    depends_on:
      - relay

    # Keep origin tokens out of the relay/Xray container. Copy
    # .wss.env.example to .wss.env (mode 0600); the sidecar fails closed when
    # required identity, ticket-key, or per-front token values are absent.
    env_file:
      - path: .wss.env
        required: false
    network_mode: host

    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      # A consumed ticket remains single-use across sidecar/container restarts.
      # The journal contains only ticket-ID hashes and bounded expiry metadata.
      - wss-replay-state:/var/lib/openrung

volumes:
  # Project-scoped and relay-local: never share this replay volume between
  # relay hosts or replace it with a fleet-wide service.
  wss-replay-state:
