name: relayhub-image

# Build and publish the relay hub image to GHCR.
# Multi-arch (amd64 + arm64) so it runs on x86 and Graviton/ARM VPSes.

on:
  push:
    branches: [main]
    tags: ['relayhub-v*']
    paths:
      - 'cmd/relayhub/**'
      - 'internal/relayhub/**'
      - 'internal/tunnel/**'
      - 'internal/relay/**'
      - 'internal/punch/**'
      - 'punchcore/**'
      - 'go.mod'
      - 'go.sum'
      - 'deploy/relayhub/**'
      - '.github/workflows/relayhub-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: version
        name: Resolve relayhub build version
        shell: bash
        run: |
          set -euo pipefail
          base_version="$(tr -d '\r\n' < cmd/relayhub/VERSION)"
          if ! printf '%s\n' "$base_version" | grep -Eq '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'; then
            echo "invalid cmd/relayhub/VERSION \"$base_version\" (want X.Y.Z)" >&2
            exit 1
          fi

          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            expected_tag="relayhub-v$base_version"
            if [ "$GITHUB_REF_NAME" != "$expected_tag" ]; then
              echo "relayhub release tag $GITHUB_REF_NAME disagrees with cmd/relayhub/VERSION ($base_version); expected $expected_tag" >&2
              exit 1
            fi
            build_version="$base_version"
            is_release=true
          else
            build_version="$base_version-dev+sha.${GITHUB_SHA:0:7}"
            is_release=false
          fi

          echo "base_version=$base_version" >> "$GITHUB_OUTPUT"
          echo "build_version=$build_version" >> "$GITHUB_OUTPUT"
          echo "is_release=$is_release" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/openrung-relayhub
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.version.outputs.base_version }},enable=${{ steps.version.outputs.is_release == 'true' }}
            type=sha
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.build_version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/relayhub/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            RELAYHUB_VERSION=${{ steps.version.outputs.build_version }}
            VCS_REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
