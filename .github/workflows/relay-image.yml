name: relay-image

# Build and publish the relay runtime image to GHCR. Multi-arch (amd64 + arm64)
# so it runs on x86 and Graviton/ARM VPSes.

on:
  push:
    branches: [main]
    tags: ['relay-v*']
    paths:
      - 'cmd/relay/**'
      - 'cmd/wsssidecar/**'
      - 'internal/relayruntime/**'
      - 'internal/tunnel/**'
      - 'internal/relay/**'
      - 'internal/wssbridge/**'
      - 'internal/punch/**'
      - 'punchcore/**'
      - 'wsscore/**'
      - 'go.mod'
      - 'go.sum'
      - '.dockerignore'
      - 'THIRD_PARTY_NOTICES.md'
      - 'deploy/relay/**'
      - '.github/workflows/relay-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: version
        name: Resolve relay build version
        shell: bash
        run: |
          set -euo pipefail
          base_version="$(tr -d '\r\n' < cmd/relay/VERSION)"
          if ! printf '%s\n' "$base_version" | grep -Eq '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'; then
            echo "invalid cmd/relay/VERSION \"$base_version\" (want X.Y.Z)" >&2
            exit 1
          fi

          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            expected_tag="relay-v$base_version"
            if [ "$GITHUB_REF_NAME" != "$expected_tag" ]; then
              echo "relay release tag $GITHUB_REF_NAME disagrees with cmd/relay/VERSION ($base_version); expected $expected_tag" >&2
              exit 1
            fi
            build_version="$base_version"
            is_release=true
          else
            build_version="$base_version-dev+sha.${GITHUB_SHA:0:7}"
            is_release=false
          fi

          echo "base_version=$base_version" >> "$GITHUB_OUTPUT"
          echo "build_version=$build_version" >> "$GITHUB_OUTPUT"
          echo "is_release=$is_release" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/openrung-relay
          # sha-* stays a dev-build identity. A release build of a commit main
          # already built injects a different -X main.version, so it produces
          # different bits; re-pushing sha-<commit> would repoint a tag the fleet
          # pins to. Releases are addressed by X.Y.Z or digest instead.
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.version.outputs.base_version }},enable=${{ steps.version.outputs.is_release == 'true' }}
            type=sha,enable=${{ steps.version.outputs.is_release != 'true' }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.build_version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/relay/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            RELAY_VERSION=${{ steps.version.outputs.build_version }}
            VCS_REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify published tags
        env:
          EXPECTED_DIGEST: ${{ steps.build.outputs.digest }}
          PUBLISHED_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          printf '%s\n' "$PUBLISHED_TAGS" | while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            actual="$(docker buildx imagetools inspect "$tag" --format '{{.Manifest.Digest}}')"
            if [ "$actual" != "$EXPECTED_DIGEST" ]; then
              echo "digest mismatch for $tag: got $actual, want $EXPECTED_DIGEST" >&2
              exit 1
            fi
          done
