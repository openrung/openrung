name: volunteer-image

# Build and publish the relay runtime image to GHCR. The workflow and image keep
# their legacy volunteer names until the artifact-alias migration.
# Multi-arch (amd64 + arm64) so it runs on x86 and Graviton/ARM VPSes.

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'cmd/volunteer/**'
      - 'internal/volunteer/**'
      - 'internal/tunnel/**'
      - 'internal/relay/**'
      - 'internal/punch/**'
      - 'punchcore/**'
      - 'go.mod'
      - 'go.sum'
      - 'deploy/volunteer/**'
      - '.github/workflows/volunteer-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/openrung-volunteer
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/volunteer/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
