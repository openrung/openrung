name: desktop-release

# Builds the OpenRung desktop app for macOS, Linux, and Windows on their native
# runners (Wails cannot cross-compile — it links each OS's native webview), with
# sing-box bundled into each. Run manually (Actions → desktop-release → Run) or
# on a version tag. Artifacts appear on the run's summary page.
on:
  workflow_dispatch:
    inputs:
      singbox_version:
        description: sing-box version to bundle (no leading v)
        default: "1.14.0-alpha.35"
  push:
    # v[0-9]*, not v*: the glob's * matches any run of non-/ characters, so a
    # bare v* also matches volunteer-v0.1.0 and would publish a desktop release
    # onto the volunteer app's tag. Requiring a digit after the v keeps the
    # existing v0.1.x convention while matching desktop tags only.
    tags: ["v[0-9]*"]

env:
  # sing-box release to bundle. Bump as needed; must exist as a GitHub release.
  SING_BOX_VERSION: ${{ github.event.inputs.singbox_version || '1.14.0-alpha.35' }}

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      product_version: ${{ steps.version.outputs.product_version }}
    steps:
      - uses: actions/checkout@v4

      - id: version
        name: Validate desktop version and release tag
        shell: bash
        run: |
          set -euo pipefail
          if ! product_version="$(jq -er '.info.productVersion | select(type == "string")' desktop/wails.json)"; then
            echo "desktop/wails.json info.productVersion must be a string" >&2
            exit 1
          fi
          if ! printf '%s\n' "$product_version" | grep -Eq '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'; then
            echo "invalid desktop/wails.json info.productVersion \"$product_version\" (want X.Y.Z)" >&2
            exit 1
          fi

          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            expected_tag="v$product_version"
            if [ "$GITHUB_REF_NAME" != "$expected_tag" ]; then
              echo "desktop release tag $GITHUB_REF_NAME disagrees with desktop/wails.json info.productVersion ($product_version); expected $expected_tag" >&2
              exit 1
            fi
          fi

          echo "product_version=$product_version" >> "$GITHUB_OUTPUT"
          echo "desktop/wails.json info.productVersion -> $product_version"

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            sbfile: darwin-arm64
          - os: ubuntu-22.04
            sbfile: linux-amd64
          - os: windows-latest
            sbfile: windows-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install Linux webview deps
        if: runner.os == 'Linux'
        # webkit2gtk 4.1 (not 4.0): modern distros (Ubuntu 24.04+, Debian 13,
        # Fedora 40+) dropped the 4.0 runtime. The 22.04 runner still has an old
        # enough glibc that the resulting binary also runs on those newer distros.
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Fetch sing-box (unix)
        if: runner.os != 'Windows'
        run: |
          V="$SING_BOX_VERSION"
          curl -sSL -o sb.tar.gz "https://github.com/SagerNet/sing-box/releases/download/v$V/sing-box-$V-${{ matrix.sbfile }}.tar.gz"
          tar -xzf sb.tar.gz
          echo "SING_BOX=$PWD/sing-box-$V-${{ matrix.sbfile }}/sing-box" >> "$GITHUB_ENV"

      - name: Fetch sing-box (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $V = "$env:SING_BOX_VERSION"
          Invoke-WebRequest -Uri "https://github.com/SagerNet/sing-box/releases/download/v$V/sing-box-$V-windows-amd64.zip" -OutFile sb.zip
          Expand-Archive sb.zip -DestinationPath sb
          "SING_BOX=$PWD\sb\sing-box-$V-windows-amd64\sing-box.exe" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          ./desktop/scripts/package-macos.sh
          ditto -c -k --keepParent desktop/build/bin/OpenRung.app desktop/build/bin/OpenRung-macos-arm64.zip

      - name: Package (Linux)
        if: runner.os == 'Linux'
        # -tags webkit2_41 links libwebkit2gtk-4.1.so.0 instead of the 4.0 soname.
        run: ./desktop/scripts/package-linux.sh -tags webkit2_41

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./desktop/scripts/package-windows.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: OpenRung-${{ matrix.sbfile }}
          path: |
            desktop/build/bin/OpenRung-*.zip
            desktop/build/bin/OpenRung-*.tar.gz
          if-no-files-found: error

  # Publish a GitHub Release with all three binaries attached. Runs only for
  # desktop `vX.Y.Z` tag pushes (not manual dispatch, which stays artifact-only
  # for testing). Requires version validation and all three build jobs to
  # succeed — we don't ship a partial release.
  release:
    needs: [version, build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the tag's GitHub Release + upload assets
    steps:
      # Pulls every artifact from this run into artifacts/<artifact-name>/<file>.
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: OpenRung Desktop v${{ needs.version.outputs.product_version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/**/OpenRung-*.zip
            artifacts/**/OpenRung-*.tar.gz
