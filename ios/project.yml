name: OpenRung
options:
  bundleIdPrefix: com.openrung
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    MARKETING_VERSION: "0.1.4"
    CURRENT_PROJECT_VERSION: "3"
    DEVELOPMENT_TEAM: 9VLV9A7KS9
    CODE_SIGN_STYLE: Automatic
packages:
  OpenRungKit:
    path: OpenRungKit
schemes:
  OpenRungClient:
    build:
      targets:
        OpenRungClient: all
    run:
      config: Debug
    archive:
      config: Release
targets:
  OpenRungClient:
    type: application
    platform: iOS
    sources:
      - OpenRungClient/App
      - OpenRungClient/Shared
    dependencies:
      - target: PacketTunnel
      - package: OpenRungKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openrung.client
        INFOPLIST_FILE: OpenRungClient/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: OpenRungClient/App/OpenRungClient.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  PacketTunnel:
    type: app-extension
    platform: iOS
    sources:
      - OpenRungClient/PacketTunnel
      - OpenRungClient/Shared
    dependencies:
      - package: OpenRungKit
      - framework: ThirdParty/Libbox.xcframework
        embed: false
      - sdk: UIKit.framework
      - sdk: libresolv.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openrung.client.PacketTunnel
        INFOPLIST_FILE: OpenRungClient/PacketTunnel/Info.plist
        CODE_SIGN_ENTITLEMENTS: OpenRungClient/PacketTunnel/PacketTunnel.entitlements
        APPLICATION_EXTENSION_API_ONLY: YES
